common:
  msg_source: 1                         # 0: not use Lidar
                                        # 1: packet message comes from online Lidar
                                        # 2: packet message comes from ROS or ROS2
                                        # 3: packet message comes from Pcap file
  send_packet_ros: false                # true: Send packets through ROS or ROS2(Used to record packet)
  send_point_cloud_ros: true            # true: Send point cloud through ROS or ROS2

# List of lidars to start - each entry creates a separate node
lidars:
  - name: lidar_front
    driver:
      lidar_type: RSAIRY
      msop_port: 6699
      difop_port: 7788
      imu_port: 6688
      user_layer_bytes: 0
      tail_layer_bytes: 0
      min_distance: 0.2
      max_distance: 60
      use_lidar_clock: true
      dense_points: false
      ts_first_point: true
      start_angle: 0
      end_angle: 360
      pcap_repeat: true
      pcap_rate: 1.0
      pcap_path: /home/robosense/lidar_front.pcap
    ros:
      ros_frame_id: rslidar_front
      ros_recv_packet_topic: /rslidar_front/packets
      ros_send_packet_topic: /rslidar_front/packets
      ros_send_imu_data_topic: /rslidar_front/imu/data
      ros_send_point_cloud_topic: /rslidar_front/points
      ros_queue_length: 100

  - name: lidar_rear
    driver:
      lidar_type: RSE1
      msop_port: 6799
      difop_port: 7888
      imu_port: 6788
      user_layer_bytes: 0
      tail_layer_bytes: 0
      min_distance: 0.2
      max_distance: 60
      use_lidar_clock: true
      dense_points: false
      ts_first_point: true
      start_angle: 0
      end_angle: 360
      pcap_repeat: true
      pcap_rate: 1.0
      pcap_path: /home/robosense/lidar_rear.pcap
    ros:
      ros_frame_id: rslidar_rear
      ros_recv_packet_topic: /rslidar_rear/packets
      ros_send_packet_topic: /rslidar_rear/packets
      ros_send_imu_data_topic: /rslidar_rear/imu/data
      ros_send_point_cloud_topic: /rslidar_rear/points
      ros_queue_length: 100
